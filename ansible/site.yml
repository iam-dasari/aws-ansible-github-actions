---
- name: Install Nginx Fleet
  hosts: role_web
  become: yes

  serial: 25

  tasks:

    - name: Update packages
      dnf:
        name: "*"
        state: latest

    - name: Install nginx
      dnf:
        name: nginx
        state: present

    - name: Enable nginx
      service:
        name: nginx
        enabled: yes

    - name: Start nginx
      service:
        name: nginx
        state: started

    - name: Verify nginx
      uri:
        url: http://localhost
        status_code: 200